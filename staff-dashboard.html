<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Water Market | Staff Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --sidebar:#16273b;
    --primary:#2487ff;
    --primary-dark:#1668cc;
    --bg:#f4f7fc;
    --white:#ffffff;
    --text:#172033;
    --muted:#6b7280;
    --success:#16a34a;
    --warning:#facc15;
    --danger:#ef4444;

    --shadow:
    0 6px 18px rgba(15,23,42,.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    display:flex;
    color:var(--text);
    font-size:14px;
}

/* ================================================= */
/* SIDEBAR */
/* ================================================= */

.sidebar{
    width:220px;
    height:100vh;

    background:linear-gradient(
        180deg,
        var(--sidebar),
        #102030
    );

    position:fixed;
    left:0;
    top:0;

    padding:20px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo-title{
    color:white;
    font-size:24px;
    font-weight:800;
}

.logo-sub{
    color:#94a3b8;
    font-size:11px;
    margin-top:6px;
    letter-spacing:1px;
}

.menu{
    margin-top:35px;

    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu button{
    border:none;
    background:transparent;

    color:#dbeafe;

    padding:13px 14px;

    border-radius:14px;

    font-size:13px;
    font-weight:600;

    text-align:left;

    cursor:pointer;

    transition:.25s ease;
}

.menu button:hover{
    background:rgba(255,255,255,.08);
}

.active-btn{
    background:linear-gradient(
        135deg,
        var(--primary),
        #4ea3ff
    ) !important;

    color:white !important;
}

.logout-btn{
    border:none;

    background:#24384f;

    color:#ff7676;

    padding:12px;

    border-radius:14px;

    font-size:13px;
    font-weight:700;

    cursor:pointer;
}

.logout-btn:hover{
    background:var(--danger);
    color:white;
}

/* ================================================= */
/* MAIN */
/* ================================================= */

.main{
    margin-left:220px;
    width:calc(100% - 220px);
    padding:24px;
}

/* ================================================= */
/* TOPBAR */
/* ================================================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:24px;
}

.page-title{
    font-size:34px;
    font-weight:800;
}

.refresh-btn{
    border:none;

    background:white;

    padding:12px 18px;

    border-radius:14px;

    font-weight:700;

    cursor:pointer;

    box-shadow:var(--shadow);
}

.refresh-btn:hover{
    background:#eef5ff;
}

/* ================================================= */
/* STATS */
/* ================================================= */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:18px;

    margin-bottom:24px;
}

.stat-card{
    background:white;

    padding:20px;

    border-radius:22px;

    box-shadow:var(--shadow);
}

.stat-title{
    color:var(--muted);

    font-size:12px;
    font-weight:700;

    margin-bottom:10px;
}

.stat-value{
    font-size:32px;
    font-weight:800;
}

/* ================================================= */
/* CARD */
/* ================================================= */

.card{
    background:white;

    padding:24px;

    border-radius:24px;

    box-shadow:var(--shadow);
}

/* ================================================= */
/* ORDER CARD */
/* ================================================= */

.order-list{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.order-card{
    background:#f8fbff;

    border-left:5px solid var(--primary);

    padding:18px;

    border-radius:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:20px;
}

.order-info h3{
    font-size:16px;
    margin-bottom:8px;
}

.order-info p{
    color:var(--muted);
    font-size:13px;
    margin-bottom:5px;
}

.status{
    display:inline-block;

    padding:8px 14px;

    border-radius:999px;

    font-size:11px;
    font-weight:700;

    margin-bottom:10px;
}

.pending{
    background:#fef3c7;
    color:#92400e;
}

.delivered{
    background:#dcfce7;
    color:#166534;
}

.complete-btn{
    border:none;

    background:linear-gradient(
        135deg,
        var(--success),
        #22c55e
    );

    color:white;

    padding:10px 16px;

    border-radius:12px;

    font-size:12px;
    font-weight:700;

    cursor:pointer;
}

.complete-btn:hover{
    opacity:.9;
}

.empty{
    text-align:center;
    padding:40px;
    color:var(--muted);
}

/* ================================================= */
/* MOBILE */
/* ================================================= */

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        width:100%;
        margin-left:0;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .order-card{
        flex-direction:column;
        align-items:flex-start;
    }

    .page-title{
        font-size:28px;
    }
}

</style>

</head>

<body>

<!-- ================================================= -->
<!-- SIDEBAR -->
<!-- ================================================= -->

<div class="sidebar">

    <div>

        <div class="logo-title">
            Water Market
        </div>

        <div class="logo-sub">
            STAFF PORTAL
        </div>

        <div class="menu">

            <button class="active-btn">
                Delivery Queue
            </button>

            <button>
                Order History
            </button>

        </div>

    </div>

    <button
        class="logout-btn"
        onclick="handleLogout()">

        Logout

    </button>

</div>

<!-- ================================================= -->
<!-- MAIN -->
<!-- ================================================= -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

        <div class="page-title">
            Staff Dashboard
        </div>

        <button
            class="refresh-btn"
            onclick="loadOrders()">

            Refresh Orders

        </button>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">

            <div class="stat-title">
                TOTAL ORDERS
            </div>

            <div
                class="stat-value"
                id="totalOrders">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                PENDING
            </div>

            <div
                class="stat-value"
                id="pendingOrders">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                DELIVERED
            </div>

            <div
                class="stat-value"
                id="deliveredOrders">

                0

            </div>

        </div>

    </div>

    <!-- ORDERS -->

    <div class="card">

        <div class="order-list" id="orderList">

            <div class="empty">
                Loading orders...
            </div>

        </div>

    </div>

</div>

<script>

async function loadOrders(){

    const container =
        document.getElementById('orderList');

    container.innerHTML = `
        <div class="empty">
            Fetching latest orders...
        </div>
    `;

    try{

        const response =
            await fetch('/api/staff/orders');

        const orders =
            await response.json();

        updateStats(orders);

        if(orders.length === 0){

            container.innerHTML = `
                <div class="empty">
                    No orders available.
                </div>
            `;

            return;
        }

        container.innerHTML =

            orders.map(order => `

                <div
                    class="order-card"
                    style="
                        border-left-color:
                        ${order.status === 'Delivered'
                            ? '#16a34a'
                            : '#2487ff'}
                    ">

                    <div class="order-info">

                        <h3>
                            Order #${order.id}
                        </h3>

                        <p>
                            Customer:
                            ${order.customer_name || 'N/A'}
                        </p>

                        <p>
                            Total:
                            ₱${order.total_price}
                        </p>

                        <p>
                            Quantity:
                            ${order.quantity}
                        </p>

                        <p>
                            Status:
                            ${order.status}
                        </p>

                    </div>

                    <div>

                        <div class="
                            status
                            ${order.status === 'Delivered'
                                ? 'delivered'
                                : 'pending'}
                        ">

                            ${order.status}

                        </div>

                        <br>

                        ${order.status === 'Pending'
                            ?

                            `
                            <button
                                class="complete-btn"
                                onclick="completeOrder(${order.id})">

                                Complete Delivery

                            </button>
                            `

                            :

                            ''
                        }

                    </div>

                </div>

            `).join('');

    }catch(error){

        container.innerHTML = `
            <div class="empty">
                Failed to load orders.
            </div>
        `;
    }
}

/* ================================================= */
/* COMPLETE ORDER */
/* ================================================= */

async function completeOrder(id){

    const confirmAction =
        confirm(
            'Mark this order as delivered?'
        );

    if(!confirmAction) return;

    try{

        const response =
            await fetch(

                `/api/orders/${id}`,

                {
                    method:'PUT'
                }

            );

        const result =
            await response.json();

        if(result.success){

            alert(
                'Order marked as delivered'
            );

            loadOrders();

        }else{

            alert(
                result.message
            );

        }

    }catch(error){

        alert(
            'Failed to update order.'
        );
    }
}

/* ================================================= */
/* STATS */
/* ================================================= */

function updateStats(orders){

    document.getElementById(
        'totalOrders'
    ).innerText =
        orders.length;

    document.getElementById(
        'pendingOrders'
    ).innerText =

        orders.filter(order =>

            order.status === 'Pending'

        ).length;

    document.getElementById(
        'deliveredOrders'
    ).innerText =

        orders.filter(order =>

            order.status === 'Delivered'

        ).length;
}

/* ================================================= */
/* LOGOUT */
/* ================================================= */

function handleLogout(){

    const confirmLogout =
        confirm(
            'Logout from Staff Portal?'
        );

    if(confirmLogout){

        window.location.href =
            'index.html';
    }
}

/* ================================================= */
/* INITIAL LOAD */
/* ================================================= */

loadOrders();

</script>

</body>
</html>
