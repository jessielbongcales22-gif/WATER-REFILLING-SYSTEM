<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Water Market | Customer Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --sidebar:#16273b;
    --sidebar-light:#1e3650;
    --primary:#2487ff;
    --primary-dark:#1668cc;
    --bg:#f4f7fc;
    --white:#ffffff;
    --text:#172033;
    --muted:#6b7280;
    --border:#e5e7eb;
    --success:#16a34a;
    --warning:#facc15;
    --danger:#ef4444;

    --shadow:
    0 6px 18px rgba(15,23,42,.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    display:flex;
    color:var(--text);
    font-size:14px;
}

/* ================================================= */
/* SIDEBAR */
/* ================================================= */

.sidebar{
    width:210px;
    height:100vh;
    background:linear-gradient(180deg,var(--sidebar),#102030);
    position:fixed;
    left:0;
    top:0;
    padding:18px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:4px 0 15px rgba(0,0,0,.06);
}

.logo-area{
    margin-bottom:28px;
}

.logo-title{
    color:white;
    font-size:22px;
    font-weight:800;
    line-height:1.1;
}

.logo-sub{
    color:#94a3b8;
    margin-top:5px;
    font-size:11px;
    letter-spacing:1px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu button{
    border:none;
    background:transparent;
    color:#dbeafe;
    padding:12px 14px;
    border-radius:12px;
    font-size:13px;
    font-weight:600;
    text-align:left;
    cursor:pointer;
    transition:.25s ease;
}

.menu button:hover{
    background:rgba(255,255,255,.08);
    transform:translateX(3px);
}

.active-btn{
    background:linear-gradient(135deg,var(--primary),#4ea3ff) !important;
    color:white !important;
    box-shadow:0 6px 14px rgba(36,135,255,.2);
}

.logout-btn{
    border:none;
    background:#24384f;
    color:#ff7676;
    padding:12px;
    border-radius:14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.25s ease;
}

.logout-btn:hover{
    background:#ef4444;
    color:white;
}

/* ================================================= */
/* MAIN */
/* ================================================= */

.main{
    margin-left:210px;
    width:calc(100% - 210px);
    padding:24px;
}

/* ================================================= */
/* TOPBAR */
/* ================================================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
}

.page-title{
    font-size:34px;
    font-weight:800;
    letter-spacing:-1px;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
    background:white;
    padding:8px 14px;
    border-radius:16px;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:.25s ease;
}

.profile:hover{
    transform:translateY(-2px);
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--primary),#57a9ff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:16px;
    font-weight:700;
}

.profile-info{
    display:flex;
    flex-direction:column;
}

.profile-label{
    color:var(--muted);
    font-size:10px;
}

.profile-email{
    font-size:13px;
    font-weight:700;
}

/* ================================================= */
/* STATS */
/* ================================================= */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    margin-bottom:22px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
}

.stat-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:5px;
    height:100%;
    background:var(--primary);
}

.stat-label{
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    margin-bottom:10px;
}

.stat-value{
    font-size:34px;
    font-weight:800;
}

/* ================================================= */
/* CARD */
/* ================================================= */

.card{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:var(--shadow);
    margin-bottom:22px;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.section-title{
    font-size:26px;
    font-weight:800;
    margin-bottom:18px;
}

/* ================================================= */
/* ORDER CARD */
/* ================================================= */

.order-card{
    background:#f8fbff;
    border-left:5px solid var(--primary);
    padding:18px;
    border-radius:18px;
    margin-bottom:14px;
}

.order-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.order-id{
    font-size:16px;
    font-weight:800;
}

.order-items{
    color:var(--muted);
    font-size:13px;
}

.status{
    padding:7px 14px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    background:#fef3c7;
    color:#92400e;
}

/* ================================================= */
/* FORM */
/* ================================================= */

label{
    display:block;
    margin-bottom:8px;
    font-weight:700;
    font-size:13px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #dbe3ef;
    border-radius:14px;
    font-size:13px;
    outline:none;
    transition:.25s ease;
}

input:focus,
select:focus,
textarea:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(36,135,255,.10);
}

textarea{
    min-height:130px;
    resize:none;
}

.flex{
    display:flex;
    gap:14px;
}

/* ================================================= */
/* BUTTON */
/* ================================================= */

.btn{
    border:none;
    background:linear-gradient(135deg,var(--primary),#4ea3ff);
    color:white;
    padding:12px 18px;
    border-radius:14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.25s ease;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 16px rgba(36,135,255,.2);
}

/* ================================================= */
/* CART */
/* ================================================= */

.cart{
    background:#f8fbff;
    padding:18px;
    border-radius:18px;
    margin-top:18px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #e6edf7;
    font-size:13px;
}

.cart-item:last-child{
    border-bottom:none;
}

.total{
    text-align:right;
    margin-top:14px;
    font-size:26px;
    font-weight:800;
    color:var(--primary);
}

/* ================================================= */
/* EMPTY */
/* ================================================= */

.empty{
    text-align:center;
    color:var(--muted);
    padding:22px;
    font-size:13px;
}

/* ================================================= */
/* MODAL */
/* ================================================= */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    width:420px;
    background:white;
    border-radius:22px;
    padding:24px;
    position:relative;
}

.close{
    position:absolute;
    right:18px;
    top:12px;
    font-size:22px;
    cursor:pointer;
}

.profile-data{
    margin-top:16px;
    line-height:1.8;
    font-size:13px;
}

iframe{
    width:100%;
    height:180px;
    border:none;
    border-radius:16px;
    margin-top:16px;
}

/* ================================================= */
/* MOBILE */
/* ================================================= */

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        width:100%;
        margin-left:0;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .flex{
        flex-direction:column;
    }

    .page-title{
        font-size:28px;
    }
}

</style>

</head>

<body onload="init()">

<div class="sidebar">

    <div>

        <div class="logo-area">

            <div class="logo-title">
                Water Market
            </div>

            <div class="logo-sub">
                CUSTOMER PORTAL
            </div>

        </div>

        <div class="menu">

            <button class="active-btn" onclick="showSection('dashboardSection', this)">
                Dashboard
            </button>

            <button onclick="showSection('ordersSection', this)">
                Orders
            </button>

            <button onclick="showSection('feedbackSection', this)">
                Feedback
            </button>

        </div>

    </div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</div>

<div class="main">

    <div class="topbar">

        <div class="page-title">
            Customer Panel
        </div>

        <div class="profile" onclick="openProfile()">

            <div class="avatar">
                👤
            </div>

            <div class="profile-info">

                <span class="profile-label">
                    Logged in as
                </span>

                <span class="profile-email" id="userEmail">
                    customer@email.com
                </span>

            </div>

        </div>

    </div>

    <div id="dashboardSection" class="section active">

        <div class="stats">

            <div class="stat-card">
                <div class="stat-label">TOTAL ORDERS</div>
                <div class="stat-value" id="totalOrders">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">PENDING ORDERS</div>
                <div class="stat-value" id="pendingOrders">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">TOTAL SPENT</div>
                <div class="stat-value" id="totalSpent">₱0</div>
            </div>

        </div>

        <div class="card">

            <div class="section-title">
                Recent Orders
            </div>

            <div id="recentOrders">
                <div class="empty">No orders yet.</div>
            </div>

        </div>

    </div>

    <div id="ordersSection" class="section">

        <div class="card">

            <div class="section-title">
                Place Order
            </div>

            <div class="flex">

                <div style="flex:3;">

                    <label>Product</label>

                    <select id="productSelect"></select>

                </div>

                <div style="flex:1;">

                    <label>Quantity</label>

                    <input type="number" id="qty" value="1" min="1">

                </div>

            </div>

            <br>

            <button class="btn" onclick="addToCart()">
                Add To Cart
            </button>

            <div class="cart">

                <div id="cartItems">
                    <div class="empty">Cart is empty.</div>
                </div>

                <div class="total" id="totalPrice">
                    ₱0.00
                </div>

            </div>

            <br>

            <button class="btn" style="width:100%;" onclick="submitOrder()">
                Submit Order
            </button>

        </div>

    </div>

    <div id="feedbackSection" class="section">

        <div class="card">

            <div class="section-title">
                Send Feedback
            </div>

            <textarea id="feedbackText" placeholder="Write your feedback here..."></textarea>

            <button class="btn" style="width:100%;" onclick="sendFeedback()">
                Send Feedback
            </button>

        </div>

    </div>

</div>

<div class="modal" id="profileModal">

    <div class="modal-content">

        <span class="close" onclick="closeProfile()">×</span>

        <h2>Customer Information</h2>

        <div class="profile-data">

            <p>
                <strong>Name:</strong>
                <span id="profileName"></span>
            </p>

            <p>
                <strong>Phone:</strong>
                <span id="profilePhone"></span>
            </p>

            <p>
                <strong>Address:</strong>
                <span id="profileAddress"></span>
            </p>

        </div>

        <iframe id="mapFrame"></iframe>

    </div>

</div>

<script>

let cart = [];

let recentOrders = JSON.parse(localStorage.getItem('recentOrders')) || [];

const inventory = [
    {
        id:1,
        name:"Mineral Water 5G",
        price:35
    },
    {
        id:2,
        name:"Alkaline Water 5G",
        price:50
    },
    {
        id:3,
        name:"Distilled Water 5G",
        price:40
    }
];

function init(){

    loadProducts();
    renderOrders();
    updateStats();

    const email =
        localStorage.getItem('activeUser')
        || 'customer@email.com';

    document.getElementById('userEmail').innerText = email;

    document.getElementById('profileName').innerText =
        localStorage.getItem('fullname') || email;

    document.getElementById('profilePhone').innerText =
        localStorage.getItem('phone') || 'N/A';

    const address =
        localStorage.getItem('address') || 'N/A';

    document.getElementById('profileAddress').innerText = address;

    if(address !== 'N/A'){
        document.getElementById('mapFrame').src =
        `https://maps.google.com/maps?q=${encodeURIComponent(address)}&output=embed`;
    }
}

function showSection(id, button){

    document.querySelectorAll('.section').forEach(section=>{
        section.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.menu button').forEach(btn=>{
        btn.classList.remove('active-btn');
    });

    if(button){
        button.classList.add('active-btn');
    }
}

function loadProducts(){

    const select = document.getElementById('productSelect');

    select.innerHTML = '';

    inventory.forEach(product=>{

        const option = document.createElement('option');

        option.value = product.id;

        option.textContent =
            `${product.name} - ₱${product.price}`;

        select.appendChild(option);
    });
}

function addToCart(){

    const id = parseInt(document.getElementById('productSelect').value);

    const qty = parseInt(document.getElementById('qty').value);

    const product = inventory.find(p=>p.id === id);

    const existing = cart.find(item=>item.id === id);

    if(existing){
        existing.qty += qty;
    }else{
        cart.push({
            ...product,
            qty
        });
    }

    renderCart();
}

function renderCart(){

    const cartDiv = document.getElementById('cartItems');

    if(cart.length === 0){

        cartDiv.innerHTML = `
            <div class="empty">
                Cart is empty.
            </div>
        `;

        document.getElementById('totalPrice').innerText = '₱0.00';
        return;
    }

    let total = 0;

    cartDiv.innerHTML = cart.map(item=>{

        const subtotal = item.price * item.qty;
        total += subtotal;

        return `
            <div class="cart-item">
                <span>${item.name} x${item.qty}</span>
                <strong>₱${subtotal}</strong>
            </div>
        `;

    }).join('');

    document.getElementById('totalPrice').innerText =
        `₱${total.toFixed(2)}`;
}

function submitOrder(){

    if(cart.length === 0){
        alert('Cart is empty');
        return;
    }

    const total = cart.reduce((sum,item)=>
        sum + (item.price * item.qty),0
    );

    const order = {
        id:Date.now(),
        items:[...cart],
        total,
        status:'Pending'
    };

    recentOrders.unshift(order);

    localStorage.setItem(
        'recentOrders',
        JSON.stringify(recentOrders)
    );

    renderOrders();
    updateStats();

    cart = [];

    renderCart();

    alert('Order submitted successfully');
}

function renderOrders(){

    const container = document.getElementById('recentOrders');

    if(recentOrders.length === 0){

        container.innerHTML = `
            <div class="empty">
                No orders yet.
            </div>
        `;

        return;
    }

    container.innerHTML = recentOrders.map(order=>`

        <div class="order-card">

            <div class="order-top">

                <div class="order-id">
                    Order #${order.id}
                </div>

                <div class="status">
                    ${order.status}
                </div>

            </div>

            <div class="order-items">
                ${
                    order.items.map(item=>
                        `${item.name} x${item.qty}`
                    ).join(', ')
                }
            </div>

        </div>

    `).join('');
}

function updateStats(){

    document.getElementById('totalOrders').innerText =
        recentOrders.length;

    document.getElementById('pendingOrders').innerText =
        recentOrders.filter(order=>
            order.status === 'Pending'
        ).length;

    const totalSpent = recentOrders.reduce((sum,order)=>
        sum + order.total,0
    );

    document.getElementById('totalSpent').innerText =
        `₱${totalSpent}`;
}

function sendFeedback(){

    const feedback =
        document.getElementById('feedbackText').value;

    if(!feedback){
        alert('Please enter feedback');
        return;
    }

    alert('Feedback submitted successfully');

    document.getElementById('feedbackText').value = '';
}

function openProfile(){
    document.getElementById('profileModal').style.display = 'flex';
}

function closeProfile(){
    document.getElementById('profileModal').style.display = 'none';
}

function logout(){

    localStorage.removeItem('activeUser');

    window.location.href = 'index.html';
}

</script>

</body>
</html>
