<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management | Water Market Pro</title>
    <style>
        :root {
            --sidebar-bg: #2c3e50;
            --primary-water: #0984e3;
            --bg-light: #f1f2f6;
            --text-main: #2d3436;
            --danger: #d63031;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            display: flex;
            background: var(--bg-light);
            color: var(--text-main);
        }

        /* Sidebar Navigation */
        nav {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        nav h2 {
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .nav-links div {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-links div:hover { background: rgba(255,255,255,0.1); }
        .nav-links div.active { background: var(--primary-water); }

        .logout-btn {
            margin-top: auto;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #ff7675;
            text-align: center;
            border: 1px solid rgba(255, 118, 117, 0.3);
            font-weight: bold;
        }

        main {
            margin-left: 260px;
            padding: 40px;
            width: 100%;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: var(--primary-water);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(9, 132, 227, 0.2);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: #636e72; font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; }

        /* Action Buttons */
        .btn-edit {
            background: #f1f2f6;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-delete {
            background: #fff5f5;
            color: var(--danger);
            border: 1px solid rgba(214, 48, 49, 0.2);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 5px;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* Modal Styles */
        #productModal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: #0984e3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

    <nav>
        <h2>Water Market Pro</h2>
        <div class="nav-links">
            <div onclick="window.location.href='admin-dashboard.html'">Dashboard</div>
            <div class="active" onclick="window.location.href='inventory.html'">Inventory</div>
            <div onclick="window.location.href='users.html'">Users</div>
            <div onclick="window.location.href='reports.html'">Reports</div>
            <div onclick="window.location.href='settings.html'">Settings</div>
        </div>
        <div class="logout-btn" onclick="window.location.href='index.html'">Logout</div>
    </nav>

    <main>
        <div class="header-actions">
            <h1>Inventory Management</h1>
            <button class="btn-add" onclick="openModal()">+ Add New Product</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Stock Level</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </main>

    <div id="productModal">
        <div class="modal-content">
            <h3>Add New Product</h3>
            <hr><br>
            <form id="addProductForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="newName" placeholder="e.g. Purified 5G" required>
                </div>
                
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="newStock" placeholder="0" required>
                </div>
                
                <div class="form-group">
                    <label>Price (₱)</label>
                    <input type="number" step="0.01" id="newPrice" placeholder="0.00" required>
                </div>
                
                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Save Product</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadInventory() {
            try {
                const response = await fetch('/api/admin/inventory');
                const items = await response.json();
                const tbody = document.getElementById('inventoryBody');
                
                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>#${item.id}</td>
                        <td><strong>${item.item_name}</strong></td>
                        <td>${item.stock_quantity} units</td>
                        <td>₱${parseFloat(item.price).toFixed(2)}</td>
                        <td>
                            <button class="btn-edit" onclick="editItem(${item.id}, '${item.item_name}', ${item.stock_quantity}, ${item.price})">Edit</button>
                            <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to load inventory:", err);
            }
        }

       async function deleteItem(id) {
        if (!confirm("Are you sure you want to delete this product?")) return;

        try {
            const response = await fetch(`/api/admin/inventory/${id}`, {
                method: 'DELETE'
            });

            // Try to read response safely (in case server returns empty)
            let data = {};
            try {
                data = await response.json();
            } catch {}

            if (response.ok) {
                alert("Product deleted successfully!");
                loadInventory();
            } else {
                console.error("Delete error:", data);
                alert(data.message || "Failed to delete product.");
            }

        } catch (error) {
            console.error("Network error:", error);
            alert("Cannot connect to server.");
        }
    }
        function openModal() { document.getElementById('productModal').style.display = 'block'; }
        function closeModal() { 
            document.getElementById('productModal').style.display = 'none'; 
            document.getElementById('addProductForm').reset();
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productData = {
                item_name: document.getElementById('newName').value,
                stock_quantity: document.getElementById('newStock').value,
                price: document.getElementById('newPrice').value
            };

            try {
                const response = await fetch('/api/admin/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                if (response.ok) {
                    closeModal();
                    loadInventory();
                }
            } catch (err) {
                alert('Error adding product.');
            }
        });

        async function editItem(id, currentName, currentStock, currentPrice) {
            const newName = prompt("Edit Product Name:", currentName);
            const newStock = prompt("Edit Stock Quantity:", currentStock);
            const newPrice = prompt("Edit Price (₱):", currentPrice);

            if (newName === null || newStock === null || newPrice === null) return;

            try {
                const response = await fetch(`/api/admin/inventory/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        item_name: newName,
                        stock_quantity: parseInt(newStock),
                        price: parseFloat(newPrice)
                    })
                });
                if (response.ok) {
                    alert("Updated successfully!");
                    loadInventory();
                }
            } catch (err) {
                alert("Edit failed.");
            }
        }

        loadInventory();
    </script>
</body>
</html>
